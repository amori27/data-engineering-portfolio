[loggers]
keys=root,producer,streamer,api

[handlers]
keys=console,file

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=console

[logger_producer]
level=INFO
handlers=console,file
qualname=producer
propagate=0

[logger_streamer]
level=INFO
handlers=console,file
qualname=streamer
propagate=0

[logger_api]
level=INFO
handlers=console,file
qualname=api
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=INFO
formatter=standard
args=('logs/pipeline.log', 'a', 10485760, 5)

[formatter_standard]
format=%(asctime)s [%(name)s] %(levelname)s: %(message)s
datefmt=%Y-%m-%dT%H:%M:%S
